blank_issues_enabled: false

# HINWEIS: Ersetze [ORG] und [REPO] durch den tatsächlichen GitHub-Organisationsnamen
# und Repository-Namen, bevor dieses Projekt produktiv genutzt wird.
# Beispiel: https://github.com/meine-hochschule/raumbuchung/blob/main/docs/...
#
# WARUM blank_issues_enabled: false?
# Alle Issues müssen über ein Template erstellt werden. Das stellt sicher, dass
# jede Aufgabe — inklusive Projektaufgaben und wiederkehrender Zeremonien — die
# Mindestinformationen enthält, die für Planung und Nachverfolgung notwendig sind.
# Auch einfache wiederkehrende Aufgaben wie "Sprint Review vorbereiten" werden
# über das Projektaufgaben-Template angelegt — das dauert unter einer Minute
# und hält den Issue Tracker konsistent.

